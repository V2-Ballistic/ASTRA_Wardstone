# ══════════════════════════════════════════════════════
#  ASTRA — Docker Compose (Development)
#  File: docker-compose.yml
# ══════════════════════════════════════════════════════
#
# F-107: top-level `version:` key removed. The Compose v2 CLI ignores
# the field, and v3 has been deprecated upstream. Keeping it in just
# emitted a deprecation warning on every `docker compose up`.

services:
  # ── PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # F-066: override hba_file so 127.0.0.1 requires scram-sha-256.
    # The mounted file at /etc/postgresql/pg_hba.conf is the source
    # of truth; the default file in PGDATA is ignored.
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      # F-104: bound to loopback only — Postgres should never be
      # reachable from another host on the LAN with the dev password.
      # Backend / pgadmin still reach the db via the docker-compose
      # network using hostname `db`, not via the host loopback.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ──
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      # F-104: pgAdmin web UI bound to loopback only.
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT}
      # ── AI (optional — leave empty in .env to disable) ──
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      # HAROLD-IN-WRENCH-001 Phase 6: HAROLD now lives inside WRENCH
      # at :8030 (was standalone V2 at :8031 under HAROLD-INT-002).
      HAROLD_INTEGRATION_ENABLED: ${HAROLD_INTEGRATION_ENABLED:-false}
      HAROLD_BASE_URL: ${HAROLD_BASE_URL:-http://host.docker.internal:8030}
      HAROLD_TIMEOUT_SECONDS: ${HAROLD_TIMEOUT_SECONDS:-3.0}
      # CADPORT-REBUILD-003 fix #1: supplier_documents blobs (incl. the
      # §6 YAMLs TDD-2 stores) must live on a PERSISTENT volume. The
      # code default (/data/supplier_docs) is NOT mounted here, so the
      # blobs were ephemeral and lost on container recreate -> YAML
      # download 500. Point it at the existing persistent upload_data
      # volume (/app/uploads).
      SUPPLIER_DOC_DIR: ${SUPPLIER_DOC_DIR:-/app/uploads/supplier_docs}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      # CAT-002: catalog_seed JSON (vendor patterns, material lexicon,
      # part-type lexicon) is loaded by app/services/cad/step_parser.py
      # at module import — without this mount the parser silently falls
      # through to "mechanical_other" / no-vendor on every upload.
      - ./backend/catalog_seed:/app/catalog_seed
      # SYSARCH-002 Phase 0: bind tests so `docker compose exec backend
      # python -m pytest` runs the host-side test files.
      - ./backend/tests:/app/tests
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    # ── Run migrations, then start the server ──
    command: >
      sh -c "
        echo '── Running Alembic migrations ──' &&
        alembic upgrade head &&
        echo '── Starting ASTRA backend ──' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    # F-105: dev healthcheck mirrors the prod one in
    # docker-compose.prod.yml so `docker compose ps` reports the
    # backend's true readiness, and `depends_on … condition:
    # service_healthy` works locally.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # SYSARCH-002 Phase 0: bind tsconfig.json so host edits to the
      # exclude list are visible to `docker compose exec frontend npx tsc`.
      - ./frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - backend
    command: sh -c "npm run build && npm start"
    # F-105: dev healthcheck for the Next.js dev server. wget -qO- on
    # the root path returns 200 once Next is ready; before that it 502s.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  pgadmin_data:
  upload_data:
