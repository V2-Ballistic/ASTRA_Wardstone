# ══════════════════════════════════════════════════════
#  ASTRA — Docker Compose (Development)
#  File: docker-compose.yml
# ══════════════════════════════════════════════════════
#
# F-107: top-level `version:` key removed. The Compose v2 CLI ignores
# the field, and v3 has been deprecated upstream. Keeping it in just
# emitted a deprecation warning on every `docker compose up`.

services:
  # ── PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # F-066: override hba_file so 127.0.0.1 requires scram-sha-256.
    # The mounted file at /etc/postgresql/pg_hba.conf is the source
    # of truth; the default file in PGDATA is ignored.
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      # F-104: bound to loopback only — Postgres should never be
      # reachable from another host on the LAN with the dev password.
      # Backend / pgadmin still reach the db via the docker-compose
      # network using hostname `db`, not via the host loopback.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ──
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      # F-104: pgAdmin web UI bound to loopback only.
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT}
      # ── AI (optional — leave empty in .env to disable) ──
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    # ── Run migrations, then start the server ──
    command: >
      sh -c "
        echo '── Running Alembic migrations ──' &&
        alembic upgrade head &&
        echo '── Starting ASTRA backend ──' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    # F-105: dev healthcheck mirrors the prod one in
    # docker-compose.prod.yml so `docker compose ps` reports the
    # backend's true readiness, and `depends_on … condition:
    # service_healthy` works locally.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    command: npm run dev
    # F-105: dev healthcheck for the Next.js dev server. wget -qO- on
    # the root path returns 200 once Next is ready; before that it 502s.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pgadmin_data:
  upload_data:
