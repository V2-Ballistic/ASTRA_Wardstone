# ══════════════════════════════════════════════════════════════
#  ASTRA — PostgreSQL pg_hba.conf
#  AUDIT_FINDINGS F-066: 127.0.0.1 is NOT trust — every TCP
#  connection requires scram-sha-256 password authentication.
# ══════════════════════════════════════════════════════════════
#
# Mounted into the container at /etc/postgresql/pg_hba.conf and
# referenced via `postgres -c hba_file=/etc/postgresql/pg_hba.conf`
# (see docker-compose.yml). Reload after edits with
#    docker exec astra-db-1 pg_ctl reload -D /var/lib/postgresql/data
# or just `docker compose restart db`.
#
# Format: TYPE  DATABASE  USER  ADDRESS         METHOD

# Local Unix socket inside the container — only the postgres OS user
# can reach this path. Trust is acceptable because there is no other
# Unix account in the container that can connect to the socket.
local   all             all                                     trust

# Loopback TCP connections (anything with `host: localhost` from
# inside the container, or anything tunneling to the host's
# 127.0.0.1:5432 binding) MUST authenticate. Previously: trust.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# All other TCP connections (docker bridge, anything else) — same.
host    all             all             all                     scram-sha-256

# Replication: same posture as application data.
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256
