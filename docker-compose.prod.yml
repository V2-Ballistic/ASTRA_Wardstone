# ══════════════════════════════════════════════════════════════
#  ASTRA — Production Docker Compose
#  File: docker-compose.prod.yml   ← NEW
#
#  Usage:
#    docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
#  Differences from dev compose:
#    ✓ nginx TLS termination (no direct backend exposure)
#    ✓ No pgAdmin exposed
#    ✓ No dev router (ENVIRONMENT=production)
#    ✓ Read-only filesystem where possible
#    ✓ CPU + memory resource limits
#    ✓ Non-root users in containers
#    ✓ PostgreSQL SSL required
#    ✓ Health checks on all services
# ══════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── nginx TLS reverse proxy ──
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"           # redirect to 443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./certs/server.key:/etc/nginx/ssl/server.key:ro
      - ./certs/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── PostgreSQL 16 (SSL-enforced) ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # NOT exposed to host in production
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/data/server.crt
        -c ssl_key_file=/var/lib/postgresql/data/server.key
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      ENVIRONMENT: production
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-30}
    # NOT exposed to host — nginx proxies
    expose:
      - "8000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --no-access-log
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    user: "1000:1000"
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  upload_data:
