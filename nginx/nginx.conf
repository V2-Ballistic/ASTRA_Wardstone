# ══════════════════════════════════════════════════════════════
#  ASTRA — Production nginx Reverse Proxy
#  File: nginx/nginx.conf   ← NEW
#
#  TLS 1.2+ only, strong cipher suites, OCSP stapling,
#  client-cert passthrough for PIV/CAC, rate limiting,
#  request size caps, and security headers.
#
#  NIST 800-53: SC-8, SC-13, SC-23, AC-17
# ══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Hide nginx version ──
    server_tokens off;

    # ── Global request size limit ──
    client_max_body_size 25M;

    # ── Rate-limit zones ──
    # Zone for general API calls: 50 req/sec burst 100
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    # Zone for auth endpoints: 5 req/sec burst 10
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Redirect HTTP → HTTPS ──
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS certificates ──
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

        # ── TLS protocol & ciphers (NIST SC-13) ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ── OCSP stapling ──
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Client certificate (PIV/CAC) — optional ──
        # Uncomment and set to the DoD CA bundle to enable PIV auth:
        # ssl_client_certificate /etc/nginx/ssl/dod-ca-bundle.pem;
        # ssl_verify_client      optional;
        # ssl_verify_depth       4;

        # ── Security headers (belt-and-suspenders with backend) ──
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Backend API ──
        location /api/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://backend:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward client certificate for PIV auth
            # proxy_set_header X-Client-Cert    $ssl_client_escaped_cert;
            # proxy_set_header X-Client-Verify  $ssl_client_verify;

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Stricter rate limit on auth endpoints ──
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://backend:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (no rate limit) ──
        location = /health {
            proxy_pass http://backend:8000/health;
        }

        # ── Frontend (Next.js) ──
        location / {
            proxy_pass http://frontend:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR (dev only — remove in prod)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Deny access to hidden files ──
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
