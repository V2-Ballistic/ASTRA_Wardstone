[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
filterwarnings = [
    "ignore::DeprecationWarning:passlib",
]
markers = [
    "performance: scale/perf tests with fixed thresholds; excluded from default suite via -m 'not performance'",
]

[tool.ruff]
line-length = 120

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
